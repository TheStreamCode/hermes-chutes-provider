name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v

  hermes-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: provider
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: NousResearch/hermes-agent
          ref: 46e87b14fd6c943ef0d6671fb0d74c5dde5d4c6b
          path: hermes-agent
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - run: python -m pip install --disable-pip-version-check -e hermes-agent
      - run: python -m unittest discover -s tests -v
        working-directory: provider
        env:
          HERMES_SOURCE: ${{ github.workspace }}/hermes-agent
      - run: python -m pip wheel . --no-deps --wheel-dir "$RUNNER_TEMP/dist"
        working-directory: provider
